<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#070714"/>
      <stop offset="100%" style="stop-color:#0A0A1E"/>
    </linearGradient>
    <radialGradient id="blueGlow" cx="38%" cy="38%" r="55%">
      <stop offset="0%" style="stop-color:#1E3A8A;stop-opacity:0.5"/>
      <stop offset="100%" style="stop-color:#070714;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="70%" cy="72%" r="40%">
      <stop offset="0%" style="stop-color:#064E3B;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#070714;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0F1535"/>
      <stop offset="100%" style="stop-color:#0A0F25"/>
    </linearGradient>
    <linearGradient id="headerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <linearGradient id="rubleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34D399"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981"/>
      <stop offset="100%" style="stop-color:#059669"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#34D399"/>
    </linearGradient>
    <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#10B981;stop-opacity:0.28"/>
      <stop offset="100%" style="stop-color:#10B981;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="pegGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#93C5FD"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>

    <filter id="cardShadow">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#000" flood-opacity="0.8"/>
    </filter>
    <filter id="coinShadow">
      <feDropShadow dx="0" dy="6" stdDeviation="20" flood-color="#000" flood-opacity="0.9"/>
    </filter>
    <filter id="chartGlow" x="-20%" y="-100%" width="140%" height="400%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="rubleGlow">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="cardClip">
      <rect x="58" y="110" width="330" height="285" rx="28"/>
    </clipPath>
  </defs>

  <!-- BACKGROUND -->
  <rect width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>
  <rect width="512" height="512" rx="110" ry="110" fill="url(#blueGlow)"/>
  <rect width="512" height="512" rx="110" ry="110" fill="url(#greenGlow)"/>

  <!-- Subtle grid -->
  <g stroke="#1A1A3A" stroke-width="1" opacity="0.35">
    <line x1="0" y1="170" x2="512" y2="170"/>
    <line x1="0" y1="340" x2="512" y2="340"/>
    <line x1="170" y1="0" x2="170" y2="512"/>
    <line x1="340" y1="0" x2="340" y2="512"/>
  </g>

  <!-- CALENDAR CARD -->
  <g filter="url(#cardShadow)">
    <rect x="58" y="110" width="330" height="285" rx="28" ry="28" fill="url(#cardGrad)"/>
  </g>
  <rect x="58" y="110" width="330" height="285" rx="28" ry="28"
    fill="none" stroke="#1E3A8A" stroke-width="1.5" opacity="0.5"/>

  <!-- Header -->
  <rect x="58" y="110" width="330" height="78" rx="28" ry="28" fill="url(#headerGrad)"/>
  <rect x="58" y="158" width="330" height="30" fill="#1D4ED8"/>

  <!-- Pegs -->
  <rect x="155" y="86" width="16" height="48" rx="8" fill="url(#pegGrad)"/>
  <rect x="275" y="86" width="16" height="48" rx="8" fill="url(#pegGrad)"/>

  <!-- Month -->
  <text x="223" y="155" text-anchor="middle"
    fill="white" font-size="22" font-weight="700"
    font-family="Inter, -apple-system, BlinkMacSystemFont, system-ui, sans-serif"
    letter-spacing="3" opacity="0.95">&#1040;&#1055;&#1056;&#1045;&#1051;&#1068; 2026</text>

  <!-- Weekday labels -->
  <g fill="#4A7CC7" font-size="11" font-weight="600"
     font-family="Inter, -apple-system, system-ui, sans-serif" text-anchor="middle">
    <text x="92"  y="208">&#1055;&#1085;</text>
    <text x="139" y="208">&#1042;&#1090;</text>
    <text x="186" y="208">&#1057;&#1088;</text>
    <text x="233" y="208">&#1063;&#1090;</text>
    <text x="280" y="208">&#1055;&#1090;</text>
    <text x="327" y="208" fill="#243360">&#1057;&#1073;</text>
    <text x="357" y="208" fill="#1E2D50">&#1042;&#1089;</text>
  </g>
  <line x1="72" y1="214" x2="374" y2="214" stroke="#1E3A8A" stroke-width="1" opacity="0.4"/>

  <!-- Row 1 cells -->
  <g fill="#131830">
    <rect x="70"  y="221" width="38" height="34" rx="7"/>
    <rect x="117" y="221" width="38" height="34" rx="7"/>
    <rect x="164" y="221" width="38" height="34" rx="7"/>
    <rect x="211" y="221" width="38" height="34" rx="7"/>
    <rect x="258" y="221" width="38" height="34" rx="7"/>
    <rect x="305" y="221" width="38" height="34" rx="7"/>
    <rect x="342" y="221" width="32" height="34" rx="7" fill="#0E1225"/>
  </g>
  <g fill="#4A6A9A" font-size="12" font-weight="500"
     font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <text x="89"  y="243">7</text>
    <text x="136" y="243">8</text>
    <text x="183" y="243">9</text>
    <text x="230" y="243">10</text>
    <text x="277" y="243">11</text>
    <text x="324" y="243" fill="#243360">12</text>
    <text x="358" y="243" fill="#1A2545">13</text>
  </g>

  <!-- Row 2 cells (today = 18) -->
  <g fill="#131830">
    <rect x="70"  y="263" width="38" height="34" rx="7"/>
    <rect x="117" y="263" width="38" height="34" rx="7"/>
    <rect x="164" y="263" width="38" height="34" rx="7"/>
    <rect x="211" y="263" width="38" height="34" rx="7" fill="#1E3875"/>
    <rect x="258" y="263" width="38" height="34" rx="7"/>
    <rect x="305" y="263" width="38" height="34" rx="7"/>
    <rect x="342" y="263" width="32" height="34" rx="7" fill="#0E1225"/>
  </g>
  <g fill="#4A6A9A" font-size="12" font-weight="500"
     font-family="Inter, system-ui, sans-serif" text-anchor="middle">
    <text x="89"  y="285">14</text>
    <text x="136" y="285">15</text>
    <text x="183" y="285">16</text>
    <text x="277" y="285">19</text>
    <text x="324" y="285">20</text>
    <text x="358" y="285" fill="#1A2545">21</text>
  </g>
  <text x="230" y="285" text-anchor="middle"
    fill="#93C5FD" font-size="13" font-weight="800"
    font-family="Inter, system-ui, sans-serif">18</text>
  <circle cx="230" cy="292" r="2.5" fill="#60A5FA"/>

  <!-- Chart area fill -->
  <polygon
    points="70,340  117,328  164,316  211,305  258,293  305,283  352,271  352,360  70,360"
    fill="url(#areaGrad)"
    clip-path="url(#cardClip)"
  />
  <!-- Trend line -->
  <polyline
    points="70,340  117,328  164,316  211,305  258,293  305,283  352,271"
    fill="none" stroke="url(#chartGrad)" stroke-width="4.5"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#chartGlow)"
    clip-path="url(#cardClip)"
  />
  <g clip-path="url(#cardClip)">
    <circle cx="117" cy="328" r="4"   fill="#10B981"/>
    <circle cx="211" cy="305" r="4"   fill="#10B981"/>
    <circle cx="305" cy="283" r="5.5" fill="#34D399"/>
    <circle cx="305" cy="283" r="2.5" fill="white"/>
  </g>

  <!-- COIN / RUBLE BADGE -->
  <circle cx="372" cy="378" r="88"  fill="#070714" opacity="0.9" filter="url(#coinShadow)"/>
  <circle cx="372" cy="378" r="82"  fill="#0C0C22"/>
  <circle cx="372" cy="378" r="78"  fill="none" stroke="url(#ringGrad)" stroke-width="4"/>
  <circle cx="372" cy="378" r="68"  fill="none" stroke="#10B981" stroke-width="1" opacity="0.2"/>
  <circle cx="372" cy="378" r="73"  fill="#0A0A1E"/>

  <!-- ₽ drawn as vector paths (centered at 372,378) -->
  <!-- Vertical stem of ₽ -->
  <rect x="348" y="337" width="13" height="80" rx="6" fill="url(#rubleGrad)" filter="url(#rubleGlow)"/>

  <!-- D-bump of ₽ (outer filled shape) -->
  <path d="M 348,337 L 374,337 Q 403,337 403,355 Q 403,373 374,373 L 348,373 Z"
    fill="url(#rubleGrad)" filter="url(#rubleGlow)"/>

  <!-- D-bump inner cutout (background color to create the hollow) -->
  <path d="M 361,348 L 373,348 Q 391,348 391,355 Q 391,362 373,362 L 361,362 Z"
    fill="#0A0A1E"/>

  <!-- Bar 1 of ₽ -->
  <rect x="339" y="380" width="63" height="9" rx="4" fill="url(#rubleGrad)" filter="url(#rubleGlow)"/>

  <!-- Bar 2 of ₽ -->
  <rect x="339" y="397" width="63" height="9" rx="4" fill="url(#rubleGrad)" filter="url(#rubleGlow)"/>

  <!-- Decorative dots around coin -->
  <g fill="#10B981" opacity="0.35">
    <circle cx="372" cy="296" r="2.5"/>
    <circle cx="437" cy="320" r="2"/>
    <circle cx="454" cy="378" r="2.5"/>
    <circle cx="437" cy="436" r="2"/>
    <circle cx="372" cy="460" r="2.5"/>
    <circle cx="307" cy="436" r="2"/>
    <circle cx="290" cy="378" r="2.5"/>
    <circle cx="307" cy="320" r="2"/>
  </g>
</svg>
